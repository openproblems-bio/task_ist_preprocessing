__merge__: /src/api/comp_method_cell_type_annotation.yaml

name: rctd
label: "RCTD"
summary: "Annotate cells using the RCTD method"
description: "Robust Cell Type Decomposition (RCTD) inputs a spatial transcriptomics dataset, which consists of a set of pixels, which are spatial locations that measure RNA counts across many genes. RCTD additionally uses a single cell RNA-seq (scRNA-seq) dataset, which is labeled for cell types. RCTD learns cell type profiles from the scRNA-seq dataset, and uses these to label the spatial transcriptomics pixels as cell types."
links:
  documentation: "https://github.com/dmcable/spacexr"
  repository: "https://github.com/dmcable/spacexr"
references:
  doi: "10.1038/s41587-021-00830-w"

# RCTD's default DE-gene / UMI thresholds are tuned for whole-transcriptome
# references (~20k genes). Imaging-based ST uses small curated panels (~100-500
# genes) where fold-changes are compressed and per-cell UMI counts are low, so
# the defaults yield "fewer than 10 regression differentially expressed genes"
# and create.RCTD() aborts. These arguments relax the thresholds for iST.
arguments:
  - name: --gene_cutoff
    type: double
    default: 0.0
    description: "Minimum normalized mean expression for a gene to be a platform-effect DE gene (RCTD default 0.000125)."
  - name: --fc_cutoff
    type: double
    default: 0.1
    description: "Minimum log-fold-change for a gene to be a platform-effect DE gene (RCTD default 0.5)."
  - name: --gene_cutoff_reg
    type: double
    default: 0.0
    description: "Minimum normalized mean expression for a gene to be a regression DE gene (RCTD default 0.0002)."
  - name: --fc_cutoff_reg
    type: double
    default: 0.1
    description: "Minimum log-fold-change for a gene to be a regression DE gene (RCTD default 0.75)."
  - name: --umi_min
    type: integer
    default: 20
    description: "Minimum total UMI per spatial cell to be included (RCTD default 100; iST cells are low-count)."
  - name: --umi_min_sigma
    type: integer
    default: 20
    description: "Minimum UMI for cells used to fit the platform-effect variance (RCTD default 300)."

resources:
  - type: r_script
    path: script.R

engines:
  - type: docker
    image: openproblems/base_r:1
    setup:
      #- type: docker
      #  run: |
      #    apt-get update && apt-get install -y wget
      - type: r
        bioc: [SingleCellExperiment, anndataR, rhdf5, devtools]
        # bioc_force_install: true
      - type: docker
        run: |
          Rscript -e "options(timeout = 600000000); devtools::install_github('dmcable/spacexr', build_vignettes = FALSE)"
# Rscript -e "BiocManager::install('SingleCellExperiment', type = 'source', force = TRUE, ask = FALSE); devtools::install_github('dmcable/spacexr', build_vignettes = FALSE)"
        
      # This can probably be left out again in the future. It currently fixes a bug described in these issues:
      # https://github.com/drighelli/SpatialExperiment/issues/171
      # https://github.com/satijalab/seurat/issues/9889
      # The reinstall of SingleCellExperiment triggers the correct re-install of SpatialExperiment.

      # spacexr -> is there a better way to install an r package from github?
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ hightime, midcpu, highmem ]