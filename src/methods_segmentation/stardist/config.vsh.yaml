name: stardist
label: "Stardist Segmentation"
summary: "Output of the segmantation methot stardist"
description: "Output of the segmantation methot stardist"
links:
  documentation: "https://github.com/stardist/stardist"
  repository: "https://github.com/stardist/stardist"
references:
  doi: "10.48550/arXiv.1806.03535"


__merge__: /src/api/comp_method_segmentation.yaml 

arguments:
  - name: --model
    type: string
    default: "2D_versatile_fluo"

resources:
  - type: python_script
    path: script.py

engines:
  # NOTE: On mac the tensorflow install leads to an error. Develop the method in a conda env instead (and test docker via gh-actions). 
  #       Installations can be done with pip (except tensorflow: use conda install -c conda-forge tensorflow)
  - type: docker
    image: openproblems/base_tensorflow_nvidia:1 # TODO: ideally get gpu image to work
    #image: openproblems/base_python:1
    __merge__: 
      - /src/base/setup_spatialdata_partial.yaml
    setup:
      - type: python
        pypi:
          # TensorFlow must be >=2.18 so it allows numpy>=2.0. anndata/spatialdata
          # reference np.bool (readded in numpy 2.0), so a numpy<2.0 pin makes
          # `import anndata` crash at runtime; TF 2.17 caps numpy<2.0, so we bump TF.
          - stardist
          - tensorflow==2.18.0
          # csbdeep/stardist use the Keras 2 API via tf_keras, which must match
          # the tensorflow version (the base image ships tf_keras 2.17).
          - tf_keras==2.18.0
          - "numpy>=2.0.0,<2.2.0"
          - scipy<1.15.0
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ hightime, midcpu, highmem, gpu ]
