name: tenx_atera
namespace: datasets/loaders

argument_groups:
  - name: Inputs
    arguments:
      - type: file
        name: --input
        required: true
        description: A 10x Atera directory or zip file or download url
      - type: string
        name: --segmentation_id
        required: true
        description: The segmentation identifier
        multiple: true
  - name: Metadata
    arguments:
      - type: string
        name: --dataset_id
        description: "A unique identifier for the dataset"
        required: true
      - name: --dataset_name
        type: string
        description: Nicely formatted name.
        required: true
      - type: string
        name: --dataset_url
        description: Link to the original source of the dataset.
        required: false
      - name: --dataset_reference
        type: string
        description: Bibtex reference of the paper in which the dataset was published.
        required: false
      - name: --dataset_summary
        type: string
        description: Short description of the dataset.
        required: true
      - name: --dataset_description
        type: string
        description: Long description of the dataset.
        required: true
      - name: --dataset_organism
        type: string
        description: The organism of the sample in the dataset.
        required: false
  - name: Outputs
    arguments:
      - name: "--output"
        __merge__: /src/api/file_common_ist.yaml
        direction: output
        required: true

resources:
  - type: python_script
    path: script.py

engines:
  - type: docker
    image: openproblems/base_python:1
    setup:
      - type: python
        pypi:
          # spatialdata 0.7.2 + zarr>=3.2 writes multiscale rasters (the xenium
          # cell/nucleus label pyramids) as rectilinear chunk grids, which zarr
          # gates behind an experimental flag and which spatialdata cannot read
          # back (rechunking to a uniform grid does NOT help -- dask's to_zarr
          # passes per-chunk sizes so the grid is always rectilinear). spatialdata
          # 0.8.0 (with ome-zarr 0.18 + dask>=2026.3) emits a regular grid again
          # and round-trips cleanly. Verified on the cluster against the real data.
          - spatialdata-io==0.7.1
          - spatialdata==0.8.0
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [highmem, midcpu, midtime]