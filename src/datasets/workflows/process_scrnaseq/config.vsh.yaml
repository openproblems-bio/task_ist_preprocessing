name: process_scrnaseq
namespace: datasets/workflows

# Generic single-cell RNA-seq processing workflow.
#
# Unlike the per-dataset process_<name>_sc workflows, this one is loader-agnostic:
# it takes an already-loaded / standardized raw SC dataset as --input and runs the
# shared processing chain (log_cp -> hvg -> pca -> knn -> extract_uns_metadata) to
# produce a file_common_scrnaseq dataset (with a 'normalized' layer, HVG, PCA and
# kNN) usable as the input_sc reference for process_datasets.
#
# Use it for custom references that have no dedicated loader (e.g. the MPII human
# lung annotation standardized by scripts/create_resources/sc/standardize_mpii_human_lung_sc.py).

argument_groups:
  - name: Inputs
    arguments:
      - type: file
        name: --input
        required: true
        description: |
          A raw single-cell RNA-seq dataset (loader-equivalent h5ad): a 'counts'
          layer, cell_type annotations in .obs, feature_name (gene symbols) in .var
          and dataset_* metadata in .uns.
  - name: Outputs
    arguments:
      - name: "--output_dataset"
        __merge__: /src/api/file_common_scrnaseq.yaml
        direction: output
        required: true
        default: "$id/dataset.h5ad"
      - name: "--output_meta"
        direction: output
        type: file
        description: "Dataset metadata"
        default: "$id/dataset_meta.yaml"

resources:
  - type: nextflow_script
    path: main.nf
    entrypoint: run_wf
  - path: /common/nextflow_helpers/helper.nf

dependencies:
  - name: normalization/log_cp
    repository: datasets
  - name: processors/pca
    repository: datasets
  - name: processors/hvg
    repository: datasets
  - name: processors/knn
    repository: datasets
  - name: utils/extract_uns_metadata
    repository: openproblems

runners:
  - type: nextflow
    directives:
      label: [midcpu, midmem, hightime]
