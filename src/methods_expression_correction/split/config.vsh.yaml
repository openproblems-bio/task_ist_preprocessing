__merge__: /src/api/comp_method_expression_correction.yaml

name: split
label: "SPLIT"
summary: "Correct doublet/misegmented cells using SPLIT"
description: "SPLIT (Spatial Purification of Layered Intracellular Transcripts) is a novel method that integrates snRNA-seq with RCTD deconvolution to enhance signal purity. SPLIT effectively resolves mixed transcriptomic signals, improving background correction and cell-type resolution."
links:
  documentation: "https://github.com/bdsc-tds/SPLIT"
  repository: "https://github.com/bdsc-tds/SPLIT"
references:
  doi: "10.1101/2025.04.23.649965"

arguments:
  - name: --keep_all_cells
    required: false
    direction: input
    type: boolean
    default: false
    description: Whether to keep cells with 0 counts (may cause errors if set to TRUE)
  # RCTD's default DE-gene / UMI thresholds are tuned for whole-transcriptome
  # references; on small iST panels (a few hundred genes, many similar fine-grained
  # cell types) fold-changes are compressed and RCTD finds "fewer than 10 DE genes".
  # These relaxed defaults mirror the rctd component so create.RCTD below succeeds.
  - name: --gene_cutoff
    type: double
    default: 0.0
    description: "Minimum normalized mean expression for a gene to be a platform-effect DE gene (RCTD default 0.000125)."
  - name: --fc_cutoff
    type: double
    default: 0.1
    description: "Minimum log-fold-change for a gene to be a platform-effect DE gene (RCTD default 0.5)."
  - name: --gene_cutoff_reg
    type: double
    default: 0.0
    description: "Minimum normalized mean expression for a gene to be a regression DE gene (RCTD default 0.0002)."
  - name: --fc_cutoff_reg
    type: double
    default: 0.1
    description: "Minimum log-fold-change for a gene to be a regression DE gene (RCTD default 0.75)."
  - name: --umi_min
    type: integer
    default: 20
    description: "Minimum total UMI per spatial cell to be included (RCTD default 100; iST cells are low-count)."
  - name: --umi_min_sigma
    type: integer
    default: 20
    description: "Minimum UMI for cells used to fit the platform-effect variance (RCTD default 300)."

resources:
  - type: r_script
    path: script.R

engines:
  - type: docker
    image: openproblems/base_r:1
    setup:
      - type: docker
        run: |
          apt-get update && apt-get install -y libcurl4-openssl-dev libssl-dev libgit2-dev libxml2-dev
      # - type: r
      #   packages: [fs, rlang, lifecycle]
      - type: r
        bioc: [SingleCellExperiment, anndataR, rhdf5, scater]
        # bioc: [SpatialExperiment, anndataR, rhdf5, scater]

        # SingleCellExperiment part can probably be left out again in the future. It currently fixes a bug described in these issues:
        # https://github.com/drighelli/SpatialExperiment/issues/171
        # https://github.com/satijalab/seurat/issues/9889
        # The reinstall of SingleCellExperiment triggers the correct re-install of SpatialExperiment.
      - type: r
        github: dmcable/spacexr
      - type: docker
        run: |
          Rscript -e 'remotes::install_github("bdsc-tds/SPLIT")'

  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ hightime, highcpu, highmem ]
