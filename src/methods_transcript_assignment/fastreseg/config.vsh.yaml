__merge__: /src/api/comp_method_transcript_assignment.yaml

name: fastreseg
label: "fastReseg transcript assignment"
summary: "Spatial segmentation correction using fastReseg method"
description: |
  fastReseg is an R package designed to enhance the precision of cell segmentation in spatial transcriptomics by 
  leveraging transcriptomic data to correct and refine initial image-based segmentation results.
links:
  documentation: "https://github.com/openproblems-bio/task_ist_preprocessing"
  repository: "https://github.com/openproblems-bio/task_ist_preprocessing"
references:
  doi: "10.1038/s41598-025-08733-5"


#arguments:
#  - name: --transcripts_key
#    type: string
#    default: "transcripts"
#    description: "Key for transcripts in the points layer"
#  - name: --coordinate_system
#    type: string
#    default: "global"
#    description: "Coordinate system for the transcripts"


resources:
  - type: bash_script
    path: orchestrator.sh
  - type: python_script
    path: input.py
  - type: r_script
    path: script.R
  - type: python_script
    path: output.py

engines:
  - type: docker
    image: openproblems/base_python:1
    setup:
      - type: apt
        packages:
          - libv8-dev
          - libudunits2-dev
          - libabsl-dev
          - gdal-bin
          - libgdal-dev
          - r-base
          # FastReseg's R dependencies as prebuilt Debian binaries. Installing
          # these via apt avoids compiling terra/igraph/sf/spatstat/stringi/etc.
          # from source (extremely slow, especially under amd64 emulation on
          # arm64 hosts). Only concaveman + GiottoUtils/GiottoClass + FastReseg
          # itself still build from source below; their heavy deps are already
          # present as binaries here.
          - r-cran-remotes
          - r-cran-terra
          - r-cran-igraph
          - r-cran-sf
          - r-cran-matrix
          - r-cran-mass
          - r-cran-e1071
          - r-cran-dbscan
          - r-cran-data.table
          - r-cran-dplyr
          - r-cran-ggplot2
          - r-cran-reshape2
          - r-cran-stringr
          - r-cran-fs
          - r-cran-lmtest
          - r-cran-matrixstats
          - r-cran-geometry
          - r-cran-spatstat.geom
      - type: docker
        # Install FastReseg from GitHub. upgrade = "never" so remotes reuses the
        # apt-installed binary deps above instead of re-fetching/recompiling them
        # from CRAN; only the unpackaged deps (concaveman, GiottoUtils,
        # GiottoClass) and FastReseg itself are compiled from source.
        run:
          - Rscript -e 'options(warn = 2); remotes::install_github("Nanostring-Biostats/FastReseg", upgrade = "never", repos = "https://cran.rstudio.com")'
      - type: python
        # `plankton` (pulled in by txsim.run_ssam for ssam cell annotation in
        # input.py) still does `from matplotlib.cm import get_cmap`, removed in
        # matplotlib 3.9. Pin < 3.9 so run_ssam imports. This is a local setup
        # step, so it runs AFTER the __merge__'d spatialdata/txsim partials (which
        # otherwise pull matplotlib >= 3.9) and wins. Mirrors methods_cell_type_annotation/ssam.
        pypi: [planktonspace, "matplotlib<3.9"]
    __merge__:
      - /src/base/setup_txsim_partial.yaml
      - /src/base/setup_spatialdata_partial.yaml
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ midtime, midcpu, midmem ]


##macOS workaround: export DOCKER_DEFAULT_PLATFORM=linux/amd64