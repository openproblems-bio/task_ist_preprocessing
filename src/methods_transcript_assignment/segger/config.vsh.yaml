__merge__: /src/api/comp_method_transcript_assignment.yaml

name: segger
label: "Segger Transcript Assignment"
summary: "Assign transcripts to cells using the Segger method"
description: "Segger is a tool for cell segmentation in single-molecule spatial omics datasets that leverages graph neural networks (GNNs) and heterogeneous graphs. This component runs segger's end-to-end CLI (`segger segment`), using the provided segmentation as the boundary prior, and maps the resulting per-transcript assignments back onto the transcripts."
links:
  documentation: "https://elihei2.github.io/segger_dev/"
  repository: "https://github.com/dpeerlab/segger"
references:
  doi: "10.1101/2025.03.14.643160"

arguments:
  - name: --transcripts_key
    type: string
    description: The key of the transcripts within the points of the spatial data
    default: transcripts
  - name: --coordinate_system
    type: string
    description: The key of the pixel space coordinate system within the spatial data
    default: global
  - name: --n_epochs
    type: integer
    required: false
    description: "Number of training epochs for the segger GNN."
    default: 20
  - name: --prediction_expansion_ratio
    type: double
    required: false
    description: "Fraction of each polygon's equivalent radius used to expand it during prediction."
    default: 0.5
  - name: --prediction_mode
    type: string
    required: false
    choices: [nucleus, cell, uniform]
    description: "Which polygon set drives the prediction graph."
    default: nucleus

resources:
  - type: python_script
    path: script.py

engines:
  # NOTE: segger runs its tiling / training / prediction end-to-end on the GPU
  #       (cudf, cuspatial, torch). Develop/test on a CUDA host; `viash test`
  #       will not run on a machine without an NVIDIA GPU.
  - type: docker
    # NGC 26.06 ships numpy 2.1 and a torch (2.13) compiled against numpy 2.x, so
    # the torch<->numpy bridge (used by the `segger segment` subprocess) stays
    # alive alongside the numpy-2.x task stack (spatialdata>=0.7.3 hard-requires
    # numpy>=2 via multiscale-spatial-image -> xarray-dataclass). The older 25.06
    # image shipped numpy-1.x torch, which cannot coexist with spatialdata>=0.7.3.
    image: nvcr.io/nvidia/pytorch:26.06-py3
    setup:
      - type: apt
        packages: [procps, git, libxcb1]
      - type: python
        github:
          - openproblems-bio/core#subdirectory=packages/python/openproblems
      - type: python
        packages:
          - "spatialdata>=0.7.3"
          - "anndata>=0.12.0"
          - "zarr>=3.0.0"
          - geopandas
          - shapely
          - "rasterio>=1.3"
          - scikit-image
      # cuspatial is imported by segger.geometry.conversion and is NOT shipped in
      # the 26.06 image (unlike 25.06). Install from the NVIDIA index (its
      # libcudf-cu12/libcuspatial-cu12 deps are not on PyPI); it pulls a matching
      # cudf-cu12. Unpinned -> resolves to the newest cuda-12 build (25.4, the last
      # cuda-12 cuspatial-cu12 on the index).
      - type: docker
        run: |
          pip install --no-cache-dir --extra-index-url=https://pypi.nvidia.com cuspatial-cu12
      # segger imports torch_geometric (at import time via _patches), lightning
      # (segger segment -> Trainer) and torch_scatter (models: scatter_max) but
      # declares NONE of them in its pyproject, so the github install below does
      # not pull them. torch_geometric/lightning are pure Python. torch_scatter has
      # no prebuilt wheel for the NGC custom torch build, so compile against it
      # (--no-build-isolation). The build host has no GPU, so force a CUDA build for
      # the target archs (A100=8.0, A10/A40=8.6, L4/L40=8.9, H100=9.0).
      - type: docker
        run:
          - pip install --no-cache-dir torch_geometric lightning
          - FORCE_CUDA=1 TORCH_CUDA_ARCH_LIST="8.0;8.6;8.9;9.0" pip install --no-cache-dir --no-build-isolation torch_scatter
      - type: python
        github: dpeerlab/segger
      # cudf 25.4 needs pandas<2.2.4, but segger (via scanpy 1.12 / anndata 0.13)
      # pulls pandas 3.0, which removed pandas.api.types.is_interval that cudf
      # imports -> `import cudf` crashes. Pin pandas back into cudf's supported
      # range as the LAST step so it wins over the deps above. numpy stays 2.x.
      - type: docker
        run:
          - pip install --no-cache-dir "pandas>=2.0,<2.2.4"
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ hightime, midcpu, highmem, gpu ]
