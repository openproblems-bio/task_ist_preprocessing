__merge__: /src/api/comp_method_transcript_assignment.yaml

name: segger
label: "Segger Transcript Assignment"
summary: "Assign transcripts to cells using the Segger method"
description: "Segger is a tool for cell segmentation in single-molecule spatial omics datasets that leverages graph neural networks (GNNs) and heterogeneous graphs. This component runs segger's end-to-end CLI (`segger segment`), using the provided segmentation as the boundary prior, and maps the resulting per-transcript assignments back onto the transcripts."
links:
  documentation: "https://elihei2.github.io/segger_dev/"
  repository: "https://github.com/dpeerlab/segger"
references:
  doi: "10.1101/2025.03.14.643160"

arguments:
  - name: --transcripts_key
    type: string
    description: The key of the transcripts within the points of the spatial data
    default: transcripts
  - name: --coordinate_system
    type: string
    description: The key of the pixel space coordinate system within the spatial data
    default: global
  - name: --n_epochs
    type: integer
    required: false
    description: "Number of training epochs for the segger GNN."
    default: 20
  - name: --prediction_graph_buffer_ratio
    type: double
    required: false
    description: "Fraction of each polygon's equivalent radius used to buffer (expand) it when building the prediction graph. Maps to segger's --prediction-graph-buffer-ratio (renamed from --prediction-expansion-ratio in segger 0.1.0)."
    default: 0.05
  - name: --prediction_mode
    type: string
    required: false
    choices: [nucleus, cell, uniform]
    description: "Which polygon set drives the prediction graph."
    default: cell
  - name: --node_representation_dim
    type: integer
    required: false
    description: >-
      Node embedding size for segger's GNN — maps to segger's --node-representation-dim
      (its `in_channels` / cells_embedding_size, default 128). segger runs a PCA with this
      many components on a genes x genes correlation matrix, so on small panels/crops (where
      fewer genes survive segger's internal count filters) the PCA fails if this exceeds the
      surviving-gene count. script.py auto-retries once at the ceiling segger reports, so this
      is effectively an upper bound; leave at 128 for full panels.
    default: 128

resources:
  - type: python_script
    path: script.py

engines:
  # NOTE: segger runs its tiling / training / prediction end-to-end on the GPU
  #       (cudf, cuspatial, torch). Develop/test on a CUDA host; `viash test`
  #       will not run on a machine without an NVIDIA GPU.
  - type: docker
    # segger is fundamentally a RAPIDS application (cudf + cuspatial + cugraph +
    # cuml). Bolting that full stack onto the NGC PyTorch base made RAPIDS's UCX
    # (cugraph -> raft_dask) collide with the image's HPC-X UCX and abort with heap
    # corruption (SIGABRT, exit 134) that no pip pin could fix. So we base on the
    # official RAPIDS image (ships cudf/cugraph/cuml/cuspatial 25.04 + a consistent,
    # working UCX/dask stack) and layer torch (GNN) + the spatialdata/anndata I/O
    # stack + segger on top. numpy 2.0.2 / pandas 2.2.3 come from the base.
    #
    # NOTE: this image runs as the NON-root 'rapids' user, so `type: apt` will NOT
    # work in a viash build (needs root). Everything below installs via conda/pip
    # only (both write to the rapids-owned conda env) — do NOT add apt steps.
    image: rapidsai/base:25.04-cuda12.8-py3.12
    setup:
      # git (for the segger + openproblems github installs) via conda: apt is
      # unavailable as non-root and the RAPIDS base ships no git.
      - type: docker
        run: conda install -y -c conda-forge git
      - type: python
        github:
          - openproblems-bio/core#subdirectory=packages/python/openproblems
      # torch (+ torchvision, which segger's data_module imports) for the GNN.
      # Standard PyPI cu124 wheels (numpy-2 compatible) coexist with the RAPIDS
      # cuda-12 libs. torchvision must match torch (2.6.0 <-> 0.21.0). Unlike the NGC
      # custom torch, torch_scatter has a PREBUILT wheel for this torch (pyg index) —
      # no CUDA compile needed. typer + torch_geometric + lightning are pure Python
      # (segger imports all three but declares none of them).
      - type: docker
        run:
          - pip install --no-cache-dir torch==2.6.0 torchvision==0.21.0 --index-url https://download.pytorch.org/whl/cu124
          - pip install --no-cache-dir torch_geometric lightning typer
          - pip install --no-cache-dir torch_scatter -f https://data.pyg.org/whl/torch-2.6.0+cu124.html
      # I/O stack. spatialdata pinned <0.8 (resolves to 0.7.1): 0.7.2+ require
      # dask>=2026.x, but RAPIDS 25.04 hard-pins dask==2025.2.0. 0.7.1 accepts dask
      # 2025.2.0; pin dask/distributed so spatialdata can't drag them up (which would
      # break RAPIDS's dask-cudf/cugraph). We validated sd.transform works on 2025.2.0.
      - type: docker
        run:
          - pip install --no-cache-dir "spatialdata>=0.7,<0.8" "zarr>=3.0.0" geopandas shapely "rasterio>=1.3" scikit-image "dask==2025.2.0" "distributed==2025.2.0"
      # Pin segger to a commit: its CLI flags AND output schema change on trunk
      # (0.1.0 renamed --prediction-expansion-ratio -> --prediction-graph-buffer-
      # ratio and dropped the `keep` column). script.py targets THIS commit; bump
      # deliberately and re-check `segger segment --help` and data/writer.py first.
      - type: python
        github: dpeerlab/segger@0233cf62eb177b6e44e49318037705550765a010
      # Final step, must be LAST (after segger's github install pulls its deps):
      #  - cudf 25.4 needs pandas<2.2.4; but anndata 0.13 / scanpy 1.12 (pulled by
      #    segger) need pandas>=2.3 (anndata 0.13's zarr reader uses
      #    pd.StringDtype(na_value=...), a pandas-2.3 API) -> reading any zarr table
      #    crashes under pandas 2.2.3. Hold anndata/scanpy at their last pandas-2.2
      #    majors (anndata 0.12.x: pandas>=2.1; scanpy 1.11.x: pandas>=1.5), and
      #    re-assert spatialdata<0.8 + dask==2025.2.0 in case a dep nudged them.
      #  - swap opencv-python -> opencv-python-headless: segger pulls opencv-python,
      #    whose cv2 needs libGL.so.1 (a system lib we cannot apt-install as non-root);
      #    the headless build provides the same cv2 without it. See NOTES.md.
      - type: docker
        run:
          - pip install --no-cache-dir "pandas>=2.0,<2.2.4" "anndata>=0.12,<0.13" "scanpy>=1.11,<1.12" "spatialdata>=0.7,<0.8" "dask==2025.2.0" "distributed==2025.2.0"
          - pip uninstall -y opencv-python || true
          - pip install --no-cache-dir opencv-python-headless
  - type: native

runners:
  - type: executable
  - type: nextflow
    directives:
      label: [ hightime, midcpu, highmem, gpu ]
